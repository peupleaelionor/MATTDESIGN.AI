<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <defs>
    <linearGradient id="grad-icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="grad-dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6B36A"/>
      <stop offset="100%" stop-color="#F0D49A"/>
    </linearGradient>
    <linearGradient id="grad-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F6F4EF"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
    <filter id="glow-icon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon Mark: Stylized "M" + precision grid + AI node -->
  <g filter="url(#glow-icon)">
    <!-- Outer hexagonal frame -->
    <path d="M6 12 L18 6 L30 12 L30 30 L18 36 L6 30 Z" fill="rgba(99,102,241,0.12)" stroke="url(#grad-icon)" stroke-width="1.2"/>
    <!-- Inner structure — M shape deconstructed -->
    <path d="M11 26 L11 16 L18 22 L25 16 L25 26" stroke="url(#grad-icon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Precision nodes -->
    <circle cx="11" cy="16" r="1.8" fill="url(#grad-icon)"/>
    <circle cx="25" cy="16" r="1.8" fill="url(#grad-icon)"/>
    <circle cx="11" cy="26" r="1.8" fill="url(#grad-icon)"/>
    <circle cx="25" cy="26" r="1.8" fill="url(#grad-icon)"/>
    <!-- Center AI dot — gold accent -->
    <circle cx="18" cy="22" r="2.5" fill="url(#grad-dot)"/>
    <!-- Micro lines — precision marks -->
    <line x1="6" y1="21" x2="9" y2="21" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
    <line x1="27" y1="21" x2="30" y2="21" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
    <line x1="18" y1="6" x2="18" y2="9" stroke="rgba(214,179,106,0.5)" stroke-width="1"/>
  </g>

  <!-- Wordmark -->
  <text x="42" y="30" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.04em" fill="url(#grad-text)">Matt</text>
  <text x="97" y="30" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.04em" fill="url(#grad-icon)">DESIGN</text>
  <text x="178" y="30" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400" letter-spacing="-0.02em" fill="url(#grad-dot)">.AI</text>
</svg>
