<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="gi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6B36A"/>
      <stop offset="100%" stop-color="#F0D49A"/>
    </linearGradient>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11131A"/>
      <stop offset="100%" stop-color="#1C1F2E"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#gbg)"/>
  <rect width="48" height="48" rx="12" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>

  <!-- Hexagonal frame -->
  <path d="M8 16 L24 8 L40 16 L40 32 L24 40 L8 32 Z" fill="rgba(99,102,241,0.08)" stroke="url(#gi)" stroke-width="1.5"/>

  <!-- M shape deconstructed -->
  <path d="M14 34 L14 20 L24 28 L34 20 L34 34" stroke="url(#gi)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Precision nodes -->
  <circle cx="14" cy="20" r="2.5" fill="url(#gi)"/>
  <circle cx="34" cy="20" r="2.5" fill="url(#gi)"/>
  <circle cx="14" cy="34" r="2.5" fill="url(#gi)"/>
  <circle cx="34" cy="34" r="2.5" fill="url(#gi)"/>

  <!-- Center AI node — gold -->
  <circle cx="24" cy="28" r="3.5" fill="url(#gd)"/>
  <circle cx="24" cy="28" r="1.5" fill="rgba(255,255,255,0.8)"/>

  <!-- Precision marks -->
  <line x1="8" y1="24" x2="11.5" y2="24" stroke="rgba(99,102,241,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36.5" y1="24" x2="40" y2="24" stroke="rgba(99,102,241,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="24" y2="11.5" stroke="rgba(214,179,106,0.6)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
